{% extends 'accounts/base.html' %}
{% block title %}Login — NeoBank{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card-box" style="width:100%; max-width:420px;">
        <div class="text-center mb-4">
            <h2 style="color:#1a1a2e; font-weight:700;">
                <span style="color:#00d4aa;">Neo</span>Bank
            </h2>
            <p class="text-muted small">Sign in to your account</p>
        </div>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-accent w-100 mt-2">Sign In</button>
        </form>
        <p class="text-center text-muted small mt-3">
            No account? <a href="{% url 'register' %}" style="color:#00d4aa;">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
