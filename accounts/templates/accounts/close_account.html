{% extends 'accounts/base.html' %}
{% block title %}Close Account — NeoBank{% endblock %}

{% block content %}
<div class="page-header">Close Account</div>
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card-box border border-danger">
            <div class="text-center py-3">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
                <h5 class="mt-3 fw-bold">Are you sure?</h5>
                <p class="text-muted small">This is permanent. Your card will be deactivated.</p>
                <p class="small"><strong>Current Balance:</strong> ₹{{ request.user.bank_account.balance }}</p>
            </div>
            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary flex-fill" style="border-radius:8px;">
                    Cancel
                </a>
                <button type="submit" class="btn btn-danger flex-fill" style="border-radius:8px;">
                    Yes, Close
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
