<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NeoBank{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #1a1a2e; --accent: #00d4aa; }
        body  { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }

        .sidebar {
            width: 230px; min-height: 100vh;
            background: var(--primary);
            position: fixed; top: 0; left: 0;
            padding: 1.5rem 1rem;
        }
        .sidebar .brand { color: var(--accent); font-size: 1.4rem; font-weight: 700; padding: 0.5rem 0.75rem 1.5rem; display:block; }
        .sidebar .nav-link { color: rgba(255,255,255,0.7); border-radius: 8px; padding: 0.6rem 0.75rem; margin-bottom: 2px; transition: all 0.2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(0,212,170,0.15); color: var(--accent); }
        .sidebar .nav-link i { margin-right: 8px; }

        .main-content { margin-left: 230px; padding: 2rem; }
        .card-box { background: #fff; border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

        .bank-card {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            border-radius: 20px; padding: 1.8rem; color: white; min-height: 180px;
        }
        .bank-card .balance-amount { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
        .bank-card .card-number    { font-size: 1.1rem; letter-spacing: 3px; font-family: monospace; margin-top: 1.5rem; }

        .btn-accent { background: var(--accent); color: #1a1a2e; font-weight: 600; border: none; border-radius: 8px; padding: 0.6rem 1.5rem; }
        .btn-accent:hover { background: #00b894; color: #1a1a2e; }

        .form-control { border-radius: 8px; border: 1.5px solid #e0e0e0; padding: 0.6rem 0.9rem; width: 100%; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.15); outline: none; }

        .tx-badge { font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
        .tx-deposit  { background: #d4edda; color: #155724; }
        .tx-out      { background: #fff3cd; color: #856404; }
        .tx-in       { background: #d1ecf1; color: #0c5460; }
        .page-header { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 1.5rem; }
    </style>
</head>
<body>

{% if user.is_authenticated %}
<div class="sidebar">
    <span class="brand"><i class="bi bi-hexagon-fill"></i> NeoBank</span>
    <nav class="nav flex-column">
        <a href="{% url 'dashboard' %}"     class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a href="{% url 'deposit' %}"       class="nav-link {% if request.resolver_match.url_name == 'deposit' %}active{% endif %}"><i class="bi bi-plus-circle"></i> Add Money</a>
        <a href="{% url 'transfer' %}"      class="nav-link {% if request.resolver_match.url_name == 'transfer' %}active{% endif %}"><i class="bi bi-arrow-left-right"></i> Transfer</a>
        <a href="{% url 'transactions' %}"  class="nav-link {% if request.resolver_match.url_name == 'transactions' %}active{% endif %}"><i class="bi bi-clock-history"></i> History</a>
        <hr style="border-color: rgba(255,255,255,0.1);">
        <a href="{% url 'close_account' %}" class="nav-link text-danger"><i class="bi bi-x-circle"></i> Close Account</a>
        <a href="{% url 'logout' %}"        class="nav-link"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </nav>
</div>
{% endif %}

<div class="{% if user.is_authenticated %}main-content{% endif %}">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
